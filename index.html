<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>App AR Interactiva - Segundo Semestre</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
        AFRAME.registerComponent('reaccionar', {
            init: function () {
                let elemento = this.el; // El objeto 3D
                let agrandado = false;  // Variable de estado

                // Escuchamos el evento 'click' (que en móviles es tocar la pantalla)
                elemento.addEventListener('click', function () {
                    if (!agrandado) {
                        // Si está normal, lo hacemos más grande
                        elemento.setAttribute('scale', '0.8 0.8 0.8');
                        agrandado = true;
                    } else {
                        // Si ya está grande, lo regresamos a su tamaño original
                        elemento.setAttribute('scale', '0.4 0.4 0.4');
                        agrandado = false;
                    }
                });
            }
        });
    </script>
</head>

<body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;"
             cursor="rayOrigin: mouse" 
             raycaster="objects: .clickable">
        
        <a-assets>
            <a-asset-item id="miModelo" src="modelo.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            
            <a-gltf-model 
                src="#miModelo" 
                class="clickable" 
                reaccionar 
                scale="0.1 0.1 0.1" 
                position="0 0 0" 
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
            </a-gltf-model>

        </a-marker>
        
        <a-entity camera></a-entity>
        
    </a-scene>
    
</body>
</html>
