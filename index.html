<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Mi App AR Interactiva</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
        // Creamos un componente personalizado llamado 'reaccionar'
        AFRAME.registerComponent('reaccionar', {
            init: function () {
                let elemento = this.el; // El modelo 3D
                let agrandado = false;  // Memoria del estado actual

                // Escuchar el evento de toque en la pantalla
                elemento.addEventListener('click', function () {
                    if (!agrandado) {
                        elemento.setAttribute('scale', '1 1 1'); // Crece
                        agrandado = true;
                    } else {
                        elemento.setAttribute('scale', '0.1 0.1 0.1'); // Vuelve a la normalidad
                        agrandado = false;
                    }
                });
            }
        });
    </script>
</head>

<body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;"
             vr-mode-ui="enabled: false"
             cursor="rayOrigin: mouse" 
             raycaster="objects: .clickable">
        
        <a-assets>
            <a-asset-item id="miModelo" src="modelo.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="hiro">
            
            <a-gltf-model 
                src="#miModelo" 
                class="clickable" 
                reaccionar 
                scale="0.1 0.1 0.1" 
                position="0 0 0" 
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
            </a-gltf-model>

        </a-marker>
        
        <a-entity camera></a-entity>
        
    </a-scene>
</body>
</html>
